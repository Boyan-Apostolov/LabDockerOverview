{% extends "base.html" %}
{% block title %}Log in - Homelab Dashboard{% endblock %}
{% block content %}
<h1>Log in</h1>

<div class="card" style="max-width: 340px;">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="hidden" name="next" value="{{ next }}">
    <div style="margin-bottom: 0.75rem;">
      <input type="password" name="password" placeholder="admin password" style="width: 100%;" autofocus required>
    </div>
    <button type="submit" class="primary">Log in</button>
  </form>
</div>
{% endblock %}
