name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - agent/**
      - server/**
      - scripts/install-agent.sh
      - .github/workflows/publish-images.yml
  workflow_dispatch: {}

env:
  DOCKERHUB_USER: bobby156

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/labdockeroverview-agent:latest
            ${{ env.DOCKERHUB_USER }}/labdockeroverview-agent:${{ github.sha }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/labdockeroverview-dashboard:latest
            ${{ env.DOCKERHUB_USER }}/labdockeroverview-dashboard:${{ github.sha }}
