name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - agent/**
      - server/**
      - scripts/install-agent.sh
      - .github/workflows/publish-images.yml
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OWNER: boyan-apostolov

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/labdockeroverview-agent:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/labdockeroverview-agent:${{ github.sha }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/labdockeroverview-dashboard:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/labdockeroverview-dashboard:${{ github.sha }}
